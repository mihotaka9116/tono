<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>MENU | Atelier TSUGUMI</title>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <link href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<section class="plans">
    <div class="w-container">
        <div class="plans-container">
            <div class="plan">
                <h3>Cake</h3>
                <div class="menu-item">
                    <span class="menu-name">いちじくのチーズケーキ</span>
                    <span class="menu-dots"></span>
                    <span class="menu-price">¥650</span>
                </div>
                <p class="text-small">綾織の秋を感じる、甘さ控えめの自家製ケーキです。</p>
            </div>

            <div class="plan">
                <h3>Standard</h3>
                <div class="menu-item">
                    <span class="menu-name">全粒粉のスコーン（2個組）</span>
                    <span class="menu-dots"></span>
                    <span class="menu-price">¥500</span>
                </div>
                <p class="text-small">外はサクッと、中はしっとり。遠野産のハチミツや自家製ジャムを添えて。</p>
            </div>

            <div class="plan">
                <h3>Drink</h3>
                <div class="menu-item">
                    <span class="menu-name">自家製甘酒ミルク</span>
                    <span class="menu-dots"></span>
                    <span class="menu-price">¥550</span>
                </div>
                <p class="text-small">米麹だけで作った優しい甘さの甘酒を、温かいミルクで割りました。</p>
            </div>
        </div>
    </div>
</section>
